<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YBO - Job Openings Portal</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: radial-gradient(circle at top center, #1b1d30 0%, #0c0d14 100%);
            min-height: 100vh;
            padding: 60px 20px;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            background: rgba(22, 24, 38, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45),
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 800px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .header-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            gap: 12px;
            flex-wrap: wrap;
        }

        h1 {
            color: #ffffff;
            font-weight: 800;
            font-size: 32px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .subtitle {
            color: #64748b;
            font-size: 15px;
            margin-bottom: 40px;
        }

        h2 {
            color: #94a3b8;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-size: 12px;
            margin-bottom: 20px;
        }

        #openingsList {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .opening-box {
            background: rgba(13, 14, 23, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .opening-box:hover {
            border-color: rgba(99, 102, 241, 0.35);
            background: rgba(20, 22, 36, 0.85);
            transform: translateX(4px);
        }

        .opening-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .company-title {
            color: #ffffff;
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.2px;
        }

        .profession-subtitle {
            color: #818cf8;
            font-size: 14px;
            font-weight: 500;
        }

        .meta-inline {
            margin-top: 4px;
            font-size: 12px;
            color: #52525b;
        }

        .meta-inline strong {
            color: #a1a1aa;
            font-weight: 500;
        }

        .btn {
            padding: 8px 16px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background: #4f46e5;
            color: white;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: #4338ca;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            background: #1e293b;
            color: #64748b;
            cursor: not-allowed;
            transform: none;
        }

        .btn-login-nav {
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .btn-login-nav:hover {
            background: linear-gradient(135deg, #5a52e6 0%, #4338ca 100%);
            box-shadow: 0 6px 16px rgba(79, 70, 229, 0.45);
        }

        .btn-dashboard-nav {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #e2e8f0;
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 8px;
        }

        .btn-dashboard-nav:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #e2e8f0;
            margin-bottom: 20px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-success {
            background: #10b981;
            width: 100%;
            padding: 14px;
            font-size: 15px;
            border-radius: 10px;
            margin-top: 25px;
        }

        .btn-success:hover {
            background: #059669;
        }

        .pagination-container {
            margin-top: 30px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
        }

        #pageInfo {
            color: #64748b;
            font-size: 13px;
            font-weight: 500;
        }

        .hidden {
            display: none;
        }

        .detail-card {
            margin-top: 5px;
            padding: 32px;
            background: rgba(13, 14, 23, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
        }

        .detail-card h2 {
            font-size: 26px;
            margin-bottom: 4px;
            text-transform: none;
            color: #ffffff;
        }

        .detail-card h4 {
            color: #818cf8;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .detail-row {
            display: flex;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-row strong {
            color: #64748b;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: 160px;
            flex-shrink: 0;
            padding-top: 2px;
        }

        .detail-row span {
            color: #e2e8f0;
            font-size: 14px;
            line-height: 1.5;
        }

        .no-openings {
            color: #64748b;
            text-align: center;
            padding: 30px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .header-wrapper {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .header-actions {
                width: 100%;
            }
            .btn-login-nav, .btn-dashboard-nav {
                width: 100%;
                text-align: center;
            }
            .opening-box {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .btn {
                width: 100%;
                text-align: center;
            }
            .detail-row {
                flex-direction: column;
                gap: 4px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-wrapper">
        <h1>Job Openings</h1>
        <div class="header-actions">
            <button id="navLoginBtn" class="btn btn-login-nav hidden" onclick="redirectToLogin()">Log In</button>
            <button id="navDashboardBtn" class="btn btn-dashboard-nav hidden" onclick="window.location.href='/user/home'">← Dashboard</button>
        </div>
    </div>
    <p class="subtitle">Browse ongoing openings and apply</p>

    <div id="listView">
        <h2>Available Positions</h2>

        <div id="openingsList"></div>

        <div class="pagination-container">
            <button id="prevBtn" class="btn" onclick="changePage(-1)">Back</button>
            <span id="pageInfo">Page: 1 / 1</span>
            <button id="nextBtn" class="btn" onclick="changePage(1)">Forward</button>
        </div>
    </div>

    <div id="detailView" class="hidden">
        <button class="btn btn-secondary" onclick="showListView()">← Back to List</button>
        <div class="detail-card">
            <h2 id="detProfession">Profession</h2>
            <h4 id="detCompany">Company</h4>

            <div class="detail-grid">
                <div class="detail-row">
                    <strong>Salary</strong>
                    <span id="detSalary">Salary...</span>
                </div>
                <div class="detail-row">
                    <strong>Schedule</strong>
                    <span id="detSchedule">Schedule...</span>
                </div>
                <div class="detail-row">
                    <strong>Job To Do</strong>
                    <span id="detJobToDo">Job details...</span>
                </div>
                <div class="detail-row">
                    <strong>Experience Needed</strong>
                    <span id="detExperience">Experience...</span>
                </div>
                <div class="detail-row">
                    <strong>Address</strong>
                    <span id="detAddress">Address...</span>
                </div>
                <div class="detail-row">
                    <strong>Phone</strong>
                    <span id="detPhone">Phone...</span>
                </div>
            </div>

            <button id="applyBtn" class="btn btn-success" onclick="applyToOpening()">Apply Now</button>
        </div>
    </div>
</div>

<script>
    const API_BASE_URL = 'http://localhost:8080/ybo/openings';

    let token = localStorage.getItem('token');
    if (token && !token.startsWith('Bearer ')) {
        token = 'Bearer ' + token;
    }

    let currentPage = 0;
    let totalPages = 1;
    let currentOpeningId = null;

    document.addEventListener("DOMContentLoaded", () => {
        checkAuthStatus();
        fetchOpenings(currentPage);
    });

    function checkAuthStatus() {
        const loginBtn = document.getElementById("navLoginBtn");
        const dashboardBtn = document.getElementById("navDashboardBtn");
        if (!token) {
            loginBtn.classList.remove("hidden");
            dashboardBtn.classList.add("hidden");
        } else {
            loginBtn.classList.add("hidden");
            dashboardBtn.classList.remove("hidden");
        }
    }

    function redirectToLogin() {
        window.location.href = '/login';
    }

    function fetchOpenings(page) {
        fetch(`${API_BASE_URL}?page=${page}&size=10`)
            .then(response => {
                if (!response.ok) throw new Error("Server error status code: " + response.status);
                return response.json();
            })
            .then(data => {
                totalPages = data.totalPages;
                currentPage = data.number;
                renderList(data.content);
                updatePaginationControls();
            })
            .catch(error => console.error("Error fetching job list:", error));
    }

    function renderList(openings) {
        const listContainer = document.getElementById("openingsList");
        listContainer.innerHTML = "";

        if (!openings || openings.length === 0) {
            listContainer.innerHTML = "<p class='no-openings'>No openings found.</p>";
            return;
        }

        openings.forEach(opening => {
            const itemHtml = `
                <div class="opening-box">
                    <div class="opening-info">
                        <div class="company-title">${opening.companyName || 'Unknown Company'}</div>
                        <div class="profession-subtitle">${opening.profession}</div>
                        <div class="meta-inline">Salary: <strong>${opening.salary}</strong></div>
                    </div>
                    <button class="btn" onclick="fetchOpeningDetails('${opening.id}')">View Details</button>
                </div>
            `;
            listContainer.innerHTML += itemHtml;
        });
    }

    function updatePaginationControls() {
        document.getElementById("pageInfo").innerText = `Page: ${currentPage + 1} / ${totalPages}`;
        document.getElementById("prevBtn").disabled = (currentPage === 0);
        document.getElementById("nextBtn").disabled = (currentPage >= totalPages - 1);
    }

    function changePage(direction) {
        currentPage += direction;
        fetchOpenings(currentPage);
    }

    function fetchOpeningDetails(id) {
        fetch(`${API_BASE_URL}/${id}`)
            .then(response => {
                if (!response.ok) throw new Error("Opening not found");
                return response.json();
            })
            .then(opening => {
                currentOpeningId = opening.id;

                document.getElementById("detProfession").innerText = opening.profession;
                document.getElementById("detCompany").innerText = opening.companyName || 'Unknown';
                document.getElementById("detSalary").innerText = opening.salary;
                document.getElementById("detSchedule").innerText = opening.schedule;
                document.getElementById("detJobToDo").innerText = opening.jobToDo;
                document.getElementById("detExperience").innerText = opening.experienceNeeded;
                document.getElementById("detAddress").innerText = opening.address;
                document.getElementById("detPhone").innerText = opening.phoneNumber;

                document.getElementById("listView").classList.add("hidden");
                document.getElementById("detailView").classList.remove("hidden");
            })
            .catch(error => console.error("Error fetching details:", error));
    }

    function showListView() {
        document.getElementById("detailView").classList.add("hidden");
        document.getElementById("listView").classList.remove("hidden");
    }

    function applyToOpening() {
        if (!currentOpeningId) return;

        if (!token) {
            alert("Authentication required! Please log in to complete your request.");
            redirectToLogin();
            return;
        }

        fetch(`${API_BASE_URL}/${currentOpeningId}/apply`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': token
            }
        })
        .then(async response => {
            if (response.status === 500) {
                alert("You don't have a CV created yet! Please create one before applying.");
                window.location.href = '/create/cv';
                return;
            }

            if (!response.ok) {
                if (response.status === 403) {
                    alert("Access Forbidden (403)! Verify you have the proper 'USER' authority role.");
                    window.location.href = '/login';
                    return;
                }

                const errText = await response.text();
                if (errText.toUpperCase().includes("CV")) {
                    alert("You don't have a CV created yet! Please create one before applying.");
                    window.location.href = '/create/cv';
                    return;
                }
                throw new Error("Application delivery failed.");
                return;
            }
            return response.text();
        })
        .then(message => {
            if (message) alert(message);
            return;
        })
        .catch(error => {
            if (error.message !== "Application delivery failed.") {
                console.error("Application submission process error:", error);
                alert(error.message);
                return;
            }
        });

    }
</script>
</body>
</html>
