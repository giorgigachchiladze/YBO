<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YBO - My Dashboard</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: radial-gradient(circle at top center, #1b1d30 0%, #0c0d14 100%);
            min-height: 100vh;
            padding: 60px 20px;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            background: rgba(22, 24, 38, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45),
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 700px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .header-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        h1 {
            color: #ffffff;
            font-weight: 800;
            font-size: 32px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #64748b;
            font-size: 15px;
            margin-bottom: 40px;
        }

        #welcomeMsg {
            color: #818cf8;
            font-weight: 600;
        }

        .nav-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .nav-card {
            background: rgba(13, 14, 23, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 22px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
        }

        .nav-card:hover {
            border-color: rgba(99, 102, 241, 0.4);
            background: rgba(20, 22, 36, 0.9);
            transform: translateX(4px);
        }

        .nav-card-text h3 {
            color: #ffffff;
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .nav-card-text p {
            color: #64748b;
            font-size: 13px;
        }

        .nav-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
        }

        .arrow {
            color: #4f46e5;
            font-size: 20px;
            flex-shrink: 0;
        }

        .btn-logout {
            width: 100%;
            margin-top: 30px;
            padding: 13px;
            background: transparent;
            border: 1px solid rgba(239, 68, 68, 0.35);
            color: #f87171;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.6);
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }
            .nav-card {
                padding: 18px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-wrapper">
        <h1>My Dashboard</h1>
    </div>
    <p class="subtitle">Welcome back<span id="welcomeMsg"></span> — here's what you can do</p>

    <div class="nav-grid">
        <a class="nav-card" href="/get/openings">
            <div class="nav-card-text">
                <h3>Browse Job Openings</h3>
                <p>Explore available positions and apply</p>
            </div>
        </a>

        <a class="nav-card" href="/create/cv">
            <div class="nav-card-text">
                <h3>My CV</h3>
                <p>Create or update your professional profile</p>
            </div>
        </a>

        <a class="nav-card" href="/get/approved/requests">
            <div class="nav-card-text">
                <h3>Approved Applications</h3>
                <p>See job offers you've received</p>
            </div>
        </a>
    </div>

    <button class="btn-logout" onclick="logout()">Log Out</button>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const token = localStorage.getItem('token');
        if (!token) {
            alert("Unauthorized access. Please log in.");
            window.location.href = '/login';
        }
    });

    function logout() {
        localStorage.removeItem('token');
        window.location.href = '/login';
    }
</script>
</body>
</html>
